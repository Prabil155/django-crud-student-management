{% load static %}
<!doctype html>
<html>
  <head>
    <title>Edit Student</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h2>Edit Student</h2>

      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Name</label>
          <input
            type="text"
            name="name"
            class="form-control"
            value="{{ student.name }}"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            name="email"
            class="form-control"
            value="{{ student.email }}"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Course</label>
          <input
            type="text"
            name="course"
            class="form-control"
            value="{{ student.course }}"
          />
        </div>

        <button type="submit" class="btn btn-success">Update</button>
        <a href="/" class="btn btn-secondary">Back</a>
      </form>
    </div>
  </body>
</html>
