{% load static %}
<!doctype html>
<html>
  <head>
    <title>Student List</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <span class="navbar-brand">Student Management System</span>
      </div>
    </nav>

    <div class="container mt-5">
      <h2 class="mb-4">Student List</h2>

      <a href="/add/" class="btn btn-primary mb-3">Add Student</a>

      <table class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Delete</th>
          </tr>
        </thead>

        <tbody>
          {% for student in students %}

          <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.course }}</td>

            <td>
              <a href="/delete/{{student.id}}" class="btn btn-danger btn-sm">
                Delete
              </a>
            </td>
          </tr>
          <td>
            <a href="/edit/{{student.id}}" class="btn btn-warning btn-sm"
              >Edit</a
            >
          </td>

          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
